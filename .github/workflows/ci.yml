# GaC: matrix — standard (train only) vs governed (train + fairness + SHAP).
name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  serving_import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies (train + serving)
        run: |
          pip install -r requirements.txt
          pip install -r requirements-serving.txt
      - name: Import serving app (no model required at import time)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -c "from serving.app import app; assert app.title; print('serving_import_ok')"

  pipeline:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [standard, governed]
    env:
      PYTHONPATH: ${{ github.workspace }}
      PIPELINE_PROFILE: ${{ matrix.profile }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch UCI South German Credit UPDATE (.asc)
        run: |
          mkdir -p data/raw
          curl -fsSL -o data/south_german.zip \
            "https://archive.ics.uci.edu/static/public/573/south+german+credit+update.zip"
          python - <<'PY'
          import zipfile
          z = zipfile.ZipFile("data/south_german.zip")
          z.extract("SouthGermanCredit.asc", path="data/raw")
          PY

      - name: Train
        run: python src/train.py

      - name: GaC gates (fairness + SHAP)
        if: matrix.profile == 'governed'
        run: |
          python src/gate_fairness.py
          python src/gate_shap.py

      - name: Show metrics
        run: |
          echo "profile=${{ matrix.profile }}"
          cat metrics/train_metrics.json
          if [ "${{ matrix.profile }}" = "governed" ]; then
            cat metrics/fairness_gate.json
            cat metrics/shap_gate.json
          fi
