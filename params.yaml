# DVC parameters — referenced by dvc.yaml and src/*.py
seed: 42

# standard = train only (performance baseline). governed = full GaC (train + gates).
pipeline:
  profile: governed

data:
  # Preferred: CSV export. Else UCI .asc (see README).
  raw_csv: data/raw/south_german_credit.csv
  raw_asc: data/raw/SouthGermanCredit.asc

model:
  name: logistic_regression
  max_iter: 500
  C: 1.0

mlflow:
  experiment_name: eu-ai-act-gac-credit
  # SQLite backend (recommended over deprecated file store in MLflow 3.x)
  tracking_uri: sqlite:///./mlflow.db

# Stress experiment: undersample rarest sensitive level in TRAIN only (Sub-RQ1 demo: governed gate should fail or worsen).
stress:
  enabled: false
  # mode: undersample | remove_rare (remove_rare drops all train rows with rarest sensitive level — gate usually fails)
  mode: undersample
  minority_keep_fraction: 0.05

# Governance gates (GaC) — fail CI if violated
gates:
  fairness:
    sensitive_column: famges
    sensitive_column_fallback: personal_status
    max_equalized_odds_difference: 0.70
  shap:
    background_samples: 80
    min_top_mean_abs_shap: 0.0
  # Gate C: enforced in GitHub Actions via environment protection (see docs/human_oversight.md)
  human_oversight:
    # Latency = seconds from automated gates complete → human approval (measured in governed_deploy workflow)
    enabled_in_ci: true
